[build]
  base    = "."
  command = "pnpm run build"
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"
  # Set VITE_API_BASE_URL in the Netlify UI → Site settings → Environment variables
  # e.g. https://wb-alerts-api.onrender.com

[[redirects]]
  # SPA fallback — all routes serve index.html
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
