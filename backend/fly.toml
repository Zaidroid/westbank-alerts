# fly.toml - Fly.io configuration for West Bank Alerts backend
# Deploy with: flyctl deploy
# Docs: https://fly.io/docs/reference/configuration/

app = "wb-alerts-api"          # change this to your unique app name
primary_region = "ams"         # Amsterdam - closest free region to West Bank

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  DB_PATH = "/data/alerts.db"
  TELEGRAM_SESSION_DIR = "/data/session"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # IMPORTANT: keep running 24/7 (no cold starts)
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  size = "shared-cpu-1x"       # Free tier: shared CPU, 256MB RAM
  memory = "256mb"

# Persistent volume for SQLite database
# Create with: flyctl volumes create wb_data --size 1 --region ams
[[mounts]]
  source = "wb_data"
  destination = "/data"

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health"
    port = 8080
    timeout = "10s"
    type = "http"
